services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expectations}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expectations}
      POSTGRES_DB: ${POSTGRES_DB:-expectations}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expectations} -d ${POSTGRES_DB:-expectations}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://expectations:expectations@postgres:5432/expectations?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
      API_PORT: ${API_PORT:-4000}
      CORS_ORIGIN: http://localhost:${WEB_PORT:-5173}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
    depends_on:
      - api

volumes:
  postgres-data:
